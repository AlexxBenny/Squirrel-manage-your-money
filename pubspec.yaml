name: squirrel
description: "FinanceOS — Personal Finance Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # State Management
  provider: ^6.1.2

  # Database (mobile + desktop + web)
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Charts
  fl_chart: ^0.70.2

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # File system & export
  path_provider: ^2.1.5
  share_plus: ^10.1.4

  # Networking (live prices)
  http: ^1.2.2

  # URL launching
  url_launcher: ^6.3.1

  # Animations
  flutter_animate: ^4.5.2

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/favicon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "images/favicon.png"
  web:
    generate: true
    image_path: "images/favicon.png"
  windows:
    generate: true
    image_path: "images/favicon.png"
    icon_size: 48
